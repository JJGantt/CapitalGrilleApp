name: CapitalGrille
options:
  bundleIdPrefix: com.jaredgantt
  deploymentTarget:
    iOS: 16.0
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  CapitalGrille:
    type: application
    platform: iOS
    sources:
      - path: CapitalGrilleApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jaredgantt.CapitalGrille
        PRODUCT_NAME: CapitalGrille
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Capital Grille
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDarkContent
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
