name: CapitalGrille
options:
  bundleIdPrefix: com.jaredgantt
  deploymentTarget:
    iOS: 16.0
    watchOS: 11.0
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: XMH4AVFC78
    CODE_SIGN_STYLE: Automatic
targets:
  CapitalGrille:
    type: application
    platform: iOS
    sources:
      - path: CapitalGrilleApp
    info:
      path: CapitalGrilleApp/Info.plist
      properties:
        CFBundleDisplayName: Capital Grille
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIStatusBarStyle: UIStatusBarStyleDarkContent
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: Lets you ask questions and add items by voice.
        NSSpeechRecognitionUsageDescription: Transcribes your voice into questions for the assistant.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            "100.106.101.57":
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jaredgantt.CapitalGrille
        PRODUCT_NAME: CapitalGrille
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
    dependencies:
      - target: CapitalGrilleWatch
        embed: true

  CapitalGrilleWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: CapitalGrilleWatch
      - path: CapitalGrilleApp/Secrets.swift
      - path: CapitalGrilleApp/SupabaseClient.swift
      - path: CapitalGrilleApp/RestockModels.swift
      - path: CapitalGrilleApp/MenuModels.swift
      - path: CapitalGrilleApp/WineModels.swift
      - path: CapitalGrilleApp/AnthropicClient.swift
      - path: CapitalGrilleApp/AppLogger.swift
      - path: CapitalGrilleApp/MacClient.swift
      - path: CapitalGrilleApp/ChatEngine.swift
      - path: CapitalGrilleApp/food-menu.json
        buildPhase: resources
    info:
      path: CapitalGrilleWatch/Info.plist
      properties:
        CFBundleDisplayName: Capital Grille
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.jaredgantt.CapitalGrille
        NSMicrophoneUsageDescription: Voice prompts to the AI assistant.
        NSSpeechRecognitionUsageDescription: Transcribes voice prompts for the assistant.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            "100.106.101.57":
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jaredgantt.CapitalGrille.watch
        TARGETED_DEVICE_FAMILY: "4"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
